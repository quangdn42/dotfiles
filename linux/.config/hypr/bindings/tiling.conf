# Close windows
bindd = SUPER, W, Close window, killactive,
bindd = CTRL ALT, DELETE, Close all windows, exec, omarchy-hyprland-window-close-all

# Control tiling
bindd = SUPER CTRL, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER CTRL, T, Pseudo window, pseudo, # dwindle
bindd = SUPER, T, Toggle window floating/tiling, togglefloating,
bindd = SUPER CTRL, M, Full width, fullscreen, 0
bindd = SUPER, M, Full screen, fullscreen, 1
bindd = SUPER, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bindd = SUPER CTRL, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Move focus with SUPER + arrow keys
bindd = SUPER, H, Focus on left window, movefocus, l
bindd = SUPER, L, Focus on right window, movefocus, r
bindd = SUPER, K, Focus on above window, movefocus, u
bindd = SUPER, J, Focus on below window, movefocus, d

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

# Swicth persistent workspaces
bindd = SUPER, A, Hme workspace, workspace, 11
bindd = SUPER, S, Msg workspace, workspace, 12
bindd = SUPER, D, Dev workspace, workspace, 13
bindd = SUPER, F, Web workspace, workspace, 14

bindd = SUPER SHIFT, A, Move window to Hme workspace, movetoworkspacesilent, 11
bindd = SUPER SHIFT, S, Move window to Msg workspace, movetoworkspacesilent, 12
bindd = SUPER SHIFT, D, Move window to Dev workspace, movetoworkspacesilent, 13
bindd = SUPER SHIFT, F, Move window to Web workspace, movetoworkspacesilent, 14

# Control global workspace
bindd = SUPER, G, Toggle global, togglespecialworkspace, scratchpad
bindd = SUPER SHIFT, G, Move window to global workspace, movetoworkspacesilent, special:scratchpad

# Switch workspaces with SUPER + [1-9; 0]
# bindd = SUPER, code:10, Switch to workspace 1, workspace, 1
# bindd = SUPER, code:11, Switch to workspace 2, workspace, 2
# bindd = SUPER, code:12, Switch to workspace 3, workspace, 3
# bindd = SUPER, code:13, Switch to workspace 4, workspace, 4
bindd = SUPER, code:14, Switch to workspace 5, workspace, 5
bindd = SUPER, code:15, Switch to workspace 6, workspace, 6
bindd = SUPER, code:16, Switch to workspace 7, workspace, 7
bindd = SUPER, code:17, Switch to workspace 8, workspace, 8
bindd = SUPER, code:18, Switch to workspace 9, workspace, 9
bindd = SUPER, code:19, Switch to workspace 10, workspace, 10

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
# bindd = SUPER SHIFT, code:10, Move window silently to workspace 1, movetoworkspacesilent, 1
# bindd = SUPER SHIFT, code:11, Move window silently to workspace 2, movetoworkspacesilent, 2
# bindd = SUPER SHIFT, code:12, Move window silently to workspace 3, movetoworkspacesilent, 3
# bindd = SUPER SHIFT, code:13, Move window silently to workspace 4, movetoworkspacesilent, 4
bindd = SUPER SHIFT, code:14, Move window silently to workspace 5, movetoworkspacesilent, 5
bindd = SUPER SHIFT, code:15, Move window silently to workspace 6, movetoworkspacesilent, 6
bindd = SUPER SHIFT, code:16, Move window silently to workspace 7, movetoworkspacesilent, 7
bindd = SUPER SHIFT, code:17, Move window silently to workspace 8, movetoworkspacesilent, 8
bindd = SUPER SHIFT, code:18, Move window silently to workspace 9, movetoworkspacesilent, 9
bindd = SUPER SHIFT, code:19, Move window silently to workspace 10, movetoworkspacesilent, 10

# TAB between workspaces
bindd = SUPER, TAB, Former workspace, workspace, previous
bindd = SUPER, N, Next workspace, workspace, e+1
bindd = SUPER, P, Previous workspace, workspace, e-1

# Cycle through applications on active workspace
bindd = ALT, TAB, Focus on next window, cyclenext
bindd = ALT SHIFT, TAB, Focus on previous window, cyclenext, prev
bindd = ALT, TAB, Reveal active window on top, bringactivetotop
bindd = ALT SHIFT, TAB, Reveal active window on top, bringactivetotop

# Resize active window
bindd = SUPER, LEFT, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, RIGHT, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER, UP, Shrink window up, resizeactive, 0 -100
bindd = SUPER, DOWN, Expand window down, resizeactive, 0 100

# Scroll through existing workspaces
bindd = SUPER SHIFT, mouse_down, Scroll active workspace forward, workspace, e+1
bindd = SUPER SHIFT, mouse_up, Scroll active workspace backward, workspace, e-1

# Scroll through windows in workspace
bindd = SUPER, mouse_up, Scroll active window forward, cyclenext
bindd = SUPER, mouse_down, Scroll active window backward, cyclenext, prev

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow
